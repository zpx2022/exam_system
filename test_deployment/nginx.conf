# 全局设置 (通常在 nginx.conf 里，但在站点配置里写也没事，或者去掉这两行)
# client_max_body_size 放到 server 块里更规范

server {
    # ==========================================================
    # ?? HTTPS 服务器 (生产模式)
    # ==========================================================
    listen 443 ssl;
    # 请把下面的 IP 换成你 Ubuntu 服务器的真实 IP，如果有域名就写域名
    server_name 0.0.0.0; 

    # --- SSL 配置 (对应刚才创建的目录) ---
    ssl_certificate      /etc/nginx/cert/server.crt;
    ssl_certificate_key  /etc/nginx/cert/server.key;
    ssl_session_cache    shared:SSL:1m;
    ssl_session_timeout  5m;
    ssl_ciphers  HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers  on;

    # --- 上传文件大小限制 ---
    client_max_body_size 20M;

    # --- 1. 前端页面 (Vue 打包后的 dist) ---
    location / {
        # 假设你把 dist 文件夹传到了这个位置
        root /var/www/exam_system/dist;
        index index.html index.htm;
        # 解决 Vue 路由 history 模式刷新 404 的问题
        try_files $uri $uri/ /index.html;
    }

    # --- 2. 后端接口 (转发给 Gunicorn) ---
    location /api/ {
        # Gunicorn 默认跑在 8000 端口 (也可以用 unix socket，这里用端口更简单)
        proxy_pass http://127.0.0.1:8000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # --- 3. 媒体文件 (用户上传的图片等) ---
    location /media/ {
        # 对应 Django settings.py 里的 MEDIA_ROOT
        alias /var/www/exam_system/media/;
        expires 30d;
    }
}

# ==========================================================
# ?? HTTP 自动跳转 HTTPS (80 -> 443)
# ==========================================================
server {
    listen 80;
    server_name 你的服务器IP;
    return 301 https://$host$request_uri;
}